<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/prueba.css">
    <title>Document</title>
</head>
<body>
    <div class="cards-container">

    <!-- CARD 1 -->
    <div class="card-horizontal">
        <img src="https://images.unsplash.com/photo-1517336714731-489689fd1ca8?auto=format&fit=crop&w=600&q=80">

        <div class="card-info">
            <h2>Laptop Dell XPS</h2>
            <h3>Ultrabook profesional</h3>

            <div class="card-details">
                <span>🔢 12 unidades</span>
                <span>💲 Oferta 20%</span>
                <span>⭐ Popular</span>
            </div>

            <button>Ver detalles</button>
        </div>
    </div>


    <!-- CARD 2 -->
    <div class="card-horizontal">
        <img src="https://images.unsplash.com/photo-1611186871348-b1ce696e52c9?auto=format&fit=crop&w=600&q=80">

        <div class="card-info">
            <h2>Monitor Gaming ASUS</h2>
            <h3>165Hz / 1ms</h3>

            <div class="card-details">
                <span>🔢 7 unidades</span>
                <span>💲 Oferta 10%</span>
                <span>🔥 Más vendido</span>
            </div>

            <button>Ver detalles</button>
        </div>
    </div>


    <!-- CARD 3 -->
    <div class="card-horizontal">
        <img src="https://images.unsplash.com/photo-1587202372775-e229f172b9d4?auto=format&fit=crop&w=600&q=80">

        <div class="card-info">
            <h2>AMD Ryzen 9</h2>
            <h3>Procesador de alto rendimiento</h3>

            <div class="card-details">
                <span>🔢 4 unidades</span>
                <span>⛔ Sin oferta</span>
                <span>⚙️ Nueva entrada</span>
            </div>

            <button>Ver detalles</button>
        </div>
    </div>

</div>
</body>
</html>
